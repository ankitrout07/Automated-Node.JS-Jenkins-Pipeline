services:
  node-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node-application
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
