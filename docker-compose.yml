services:
  node-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node-application
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
